spring:
  application:
    name: analyzer
  config:
    import: "configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000

  eureka:
    client:
      serviceUrl:
        defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
grpc:
  server:
    port: 9090
  datasource:
    url: jdbc:postgresql://localhost:5437/${POSTGRES_DB:analyzer}
    driver-class-name: org.postgresql.Driver
    username: analyzer
    password: analyzer
    init: DEBUG
  sql:
    init:
      mode: always
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: none
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false