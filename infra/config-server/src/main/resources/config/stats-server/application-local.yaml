# ============================================================================
# STATS-SERVER - КОНФИГУРАЦИЯ (application-postgres.yml)
# ============================================================================
# Сервер статистики, использует PostgreSQL.
# Порт: 9090, БД: ewm_stats_db
# ============================================================================

server:
  port: 9090                                 # Порт сервера статистики

spring:
  # --------------------------------------------------------------------------
  # ПОДКЛЮЧЕНИЕ К POSTGRESQL
  # --------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:6543/ewm_stats_db
    username: stats_user
    password: stats_password

  # --------------------------------------------------------------------------
  # JPA НАСТРОЙКИ
  # --------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update                       # Автоматическое обновление схемы
      show-sql: true                         # Вывод SQL в консоль
    properties:
      hibernate:
        format_sql: true                     # Форматирование SQL для читаемости

# ----------------------------------------------------------------------------
# ЛОГИРОВАНИЕ HIBERNATE
# ----------------------------------------------------------------------------
logging:
  level:
    org.hibernate.SQL: DEBUG                 # Логирование SQL запросов
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # Логирование параметров запросов