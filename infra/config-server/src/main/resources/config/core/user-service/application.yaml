spring:
  application:
    name: user-service
  cloud:
    openfeign:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5434/${POSTGRES_DB:user}
    driver-class-name: org.postgresql.Driver
    username: user
    password: user
    init: DEBUG
  sql:
    init:
      mode: always
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: none
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: "*"