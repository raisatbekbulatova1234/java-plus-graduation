spring:
  application:
    name: request-service
  cloud:
    openfeign:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5435/${POSTGRES_DB:request}
    driver-class-name: org.postgresql.Driver
    username: request
    password: request
    init: DEBUG
  sql:
    init:
      mode: always
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: none
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: "*"

grpc:
  server:
    port: 0
  client:
    collector: # <- должно соответствовать значению в @GrpcClient
      address: 'discovery:///collector' # адрес gRPC-сервиса
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
    analyzer: # <- должно соответствовать значению в @GrpcClient
      address: 'discovery:///analyzer' # адрес gRPC-сервиса
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext