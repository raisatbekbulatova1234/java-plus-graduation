# ============================================================================
# КОНФИГУРАЦИЯ БАЗЫ ДАННЫХ (ОБЩАЯ)
# ============================================================================
# Применяется для всех сервисов, работающих с PostgreSQL через JPA.
# Конкретные значения url, username, password задаются через переменные окружения
# или в профилях сервисов (postgres.yml, test.yml).
# ============================================================================

spring:
  # --------------------------------------------------------------------------
  # JPA НАСТРОЙКИ
  # --------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate              # Проверяет схему БД при старте (не изменяет)

  # --------------------------------------------------------------------------
  # ПОДКЛЮЧЕНИЕ К POSTGRESQL
  # --------------------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL}           # JDBC URL (обязательно)
    username: ${SPRING_DATASOURCE_USERNAME} # Имя пользователя (обязательно)
    password: ${SPRING_DATASOURCE_PASSWORD} # Пароль (обязательно)
    driver-class-name: org.postgresql.Driver

  # --------------------------------------------------------------------------
  # ИНИЦИАЛИЗАЦИЯ БД
  # --------------------------------------------------------------------------
  sql:
    init:
      mode: always                    # Всегда выполнять schema.sql/data.sql при старте

  # --------------------------------------------------------------------------
  # HIBERNATE ДИАЛЕКТ
  # --------------------------------------------------------------------------
  jpa.properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect