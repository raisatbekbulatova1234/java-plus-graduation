# ============================================================================
# КОНФИГУРАЦИЯ БАЗЫ ДАННЫХ (ОБЩАЯ)
# ============================================================================
# Применяется для всех сервисов, работающих с PostgreSQL через JPA.
# ============================================================================

spring:
  # --------------------------------------------------------------------------
  # JPA НАСТРОЙКИ
  # --------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate              # Проверяет схему БД при старте (не изменяет)

  # --------------------------------------------------------------------------
  # ПОДКЛЮЧЕНИЕ К POSTGRESQL
  # --------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/ewm_main_db
    username: ewm_user
    password: ewm_password
    driver-class-name: org.postgresql.Driver

  # --------------------------------------------------------------------------
  # ИНИЦИАЛИЗАЦИЯ БД
  # --------------------------------------------------------------------------
  sql:
    init:
      mode: always                    # Всегда выполнять schema.sql/data.sql при старте

  # --------------------------------------------------------------------------
  # HIBERNATE ДИАЛЕКТ
  # --------------------------------------------------------------------------
  jpa.properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect