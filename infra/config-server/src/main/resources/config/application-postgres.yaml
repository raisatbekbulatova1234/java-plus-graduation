spring:
  jpa:
    hibernate:
      ddl-auto: create  # изменили с validate на create
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/ewm_main_db
    username: ewm_user
    password: ewm_password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never  # отключаем schema.sql
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect