# ============================================================================
# MAIN-SERVICE - ПОСТГРЕС ПРОФИЛЬ (postgres)
# ============================================================================
# Основной сервис бизнес-логики, использует PostgreSQL.
# Настройки сервера, статистики, базы данных и логирования.
# ============================================================================

server:
  port: 8081                                 # Порт сервиса

# ----------------------------------------------------------------------------
# КЛИЕНТ СЕРВИСА СТАТИСТИКИ
# ----------------------------------------------------------------------------
stats-server:
  url: http://localhost:9090                 # Адрес stats-server

# ----------------------------------------------------------------------------
# ПОДКЛЮЧЕНИЕ К POSTGRESQL
# ----------------------------------------------------------------------------
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ewm_main_db   # БД основного сервиса
    username: ewm_user
    password: ewm_password

# ----------------------------------------------------------------------------
# ЛОГИРОВАНИЕ
# ----------------------------------------------------------------------------
logging:
  level:
    root: INFO                               # Общий уровень
    ru.practicum.explorewithme.main: DEBUG   # Детальное логирование пакета main